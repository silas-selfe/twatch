name: Sync analytics dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths: [index.html, traffic-analytics.html]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Copy dashboard files onto gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout gh-pages
          git checkout main -- index.html traffic-analytics.html
          git add index.html traffic-analytics.html
          git diff --cached --quiet && echo "dashboard unchanged" && exit 0
          git commit -m "Sync dashboard from main ${GITHUB_SHA::7}"
          git push origin gh-pages
