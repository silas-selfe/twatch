# One camera node = this file + a site.yaml + a .env with TW_CENTRAL_DSN.
#   docker compose up -d
# Watchtower keeps the node on the latest image pushed to GHCR.
services:
  collector:
    image: ghcr.io/silas-selfe/twatch:latest
    restart: unless-stopped
    devices:
      - /dev/video0:/dev/video0          # the webcam (Linux/Pi)
    volumes:
      - ./site.yaml:/config/site.yaml:ro
      - twdata:/data

  shipper:
    image: ghcr.io/silas-selfe/twatch:latest
    command: ["python", "/app/aggregator.py", "--loop"]
    restart: unless-stopped
    environment:
      TW_CENTRAL_DSN: ${TW_CENTRAL_DSN}  # from .env, never committed
    volumes:
      - ./site.yaml:/config/site.yaml:ro
      - twdata:/data

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 1800 --cleanup   # check GHCR every 30 min

volumes:
  twdata:
