<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}twatch{% endblock %}</title>
  <link rel="stylesheet" href="/static/tw.css?v={{ v }}">
  <style>
    .topbar { max-width: 1100px; margin: 0 auto; padding: 20px 24px 0;
              display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .brand { font-weight: 700; font-size: 16px; letter-spacing: -0.01em;
             color: var(--ink); text-decoration: none; }
    .brand span { color: var(--vol); }
    .topbar .who { display: flex; align-items: center; gap: 12px;
                   font-size: 12.5px; color: var(--muted); }
    .topbar button { font: inherit; font-size: 12.5px; font-weight: 600;
                     color: var(--ink2); background: var(--surface);
                     border: 1px solid var(--border); border-radius: 7px;
                     padding: 5px 12px; cursor: pointer; }
    .sitegrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 12px; margin-top: 12px; }
    a.sitecard { text-decoration: none; color: inherit; display: block; }
    .sitecard .card { margin-top: 0; height: 100%; }
    .sitecard h3 { margin: 0 0 2px; font-size: 14.5px; color: var(--ink); }
    .sitecard .meta { font-size: 12px; color: var(--muted); }
    .sitecard .big { font-size: 30px; font-weight: 650; margin: 8px 0 0; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .dot.ok { background: #0ca30c; }
    .dot.stale { background: var(--warn); }
    .dot.down { background: #d03b3b; }
    .backlink { font-size: 12.5px; color: var(--muted); text-decoration: none; }
  </style>
</head>
<body>
  {% block topbar %}
  <div class="topbar">
    <a class="brand" href="/">t<span>watch</span></a>
    <div class="who">
      <span>{{ user }}</span>
      <form method="post" action="/logout"><button>Sign out</button></form>
    </div>
  </div>
  {% endblock %}
  {% block content %}{% endblock %}
  <div id="tooltip" role="status"></div>
  <script src="/static/tw-charts.js?v={{ v }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
